name: lint check

on:
  push:
    paths: "*.py"

jobs:
  codes:
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v7.0.0

      - name: setup python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13' 

      - name: python install
        run: pip install ruff

      - name: check lint
        run: ruff check .
